<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BillSplit Pro • Split Bills Instantly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-rose-950 text-slate-200 font-sans">
  <div class="max-w-md mx-auto px-4 py-10 space-y-6">

    <!-- Header -->
    <div class="text-center space-y-2">
      <div class="w-16 h-16 mx-auto bg-gradient-to-r from-rose-500 to-pink-600 rounded-2xl shadow-2xl flex items-center justify-center text-3xl">💸</div>
      <h1 class="text-3xl font-bold bg-gradient-to-r from-white to-slate-300 bg-clip-text text-transparent">BillSplit Pro</h1>
      <p class="text-slate-400 text-sm">Split any bill in seconds. No drama.</p>
    </div>

    <!-- Bill setup -->
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-2xl space-y-5">
      <h2 class="text-lg font-bold">The bill</h2>

      <div>
        <label class="block text-xs text-slate-400 mb-1">Total bill amount (€)</label>
        <input id="totalInput" type="number" inputmode="decimal" placeholder="0.00" min="0"
          class="w-full p-4 bg-white/5 border border-white/20 rounded-2xl text-white text-2xl font-bold placeholder-slate-600 focus:ring-2 focus:ring-rose-500 focus:outline-none">
      </div>

      <!-- Tip selector -->
      <div>
        <label class="block text-xs text-slate-400 mb-2">Tip</label>
        <div class="flex gap-2 flex-wrap">
          <button onclick="setTip(0)"  id="tip0"  class="tip-btn px-4 py-2 rounded-xl border text-sm font-semibold transition-all border-white/20 bg-white/5">0%</button>
          <button onclick="setTip(10)" id="tip10" class="tip-btn px-4 py-2 rounded-xl border text-sm font-semibold transition-all border-white/20 bg-white/5">10%</button>
          <button onclick="setTip(15)" id="tip15" class="tip-btn px-4 py-2 rounded-xl border text-sm font-semibold transition-all border-rose-500 bg-rose-600/30 ring-2 ring-rose-500">15%</button>
          <button onclick="setTip(20)" id="tip20" class="tip-btn px-4 py-2 rounded-xl border text-sm font-semibold transition-all border-white/20 bg-white/5">20%</button>
          <button onclick="setTip(25)" id="tip25" class="tip-btn px-4 py-2 rounded-xl border text-sm font-semibold transition-all border-white/20 bg-white/5">25%</button>
        </div>
        <div class="flex items-center gap-3 mt-3">
          <span class="text-xs text-slate-400">Custom:</span>
          <input id="customTip" type="number" inputmode="numeric" placeholder="%" min="0" max="100"
            class="w-24 p-2 bg-white/5 border border-white/20 rounded-xl text-white text-sm focus:ring-2 focus:ring-rose-500 focus:outline-none">
          <span id="tipAmount" class="text-sm text-rose-300 font-semibold"></span>
        </div>
      </div>

      <!-- Mode toggle -->
      <div>
        <label class="block text-xs text-slate-400 mb-2">Split mode</label>
        <div class="bg-white/5 rounded-2xl p-1 flex gap-1">
          <button id="btnEqual" onclick="setMode('equal')" class="flex-1 py-3 rounded-xl font-semibold text-sm transition-all bg-rose-600 text-white">⚖️ Equal</button>
          <button id="btnUnequal" onclick="setMode('unequal')" class="flex-1 py-3 rounded-xl font-semibold text-sm transition-all text-slate-400 hover:text-white">🎯 Custom</button>
        </div>
      </div>
    </div>

    <!-- Equal split -->
    <div id="equalPanel" class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-2xl space-y-4">
      <h2 class="text-lg font-bold">👥 How many people?</h2>
      <div class="flex items-center gap-4 justify-center">
        <button onclick="adjustPeople(-1)" class="w-14 h-14 bg-white/10 hover:bg-white/20 rounded-2xl text-2xl font-bold transition-all">−</button>
        <span id="peopleCount" class="text-5xl font-black text-rose-300 w-16 text-center">2</span>
        <button onclick="adjustPeople(1)"  class="w-14 h-14 bg-white/10 hover:bg-white/20 rounded-2xl text-2xl font-bold transition-all">+</button>
      </div>

      <!-- Result -->
      <div id="equalResult" class="hidden text-center py-6 bg-black/20 rounded-2xl">
        <div class="text-slate-400 text-sm mb-1">Each person pays</div>
        <div id="perPersonAmount" class="text-5xl font-black text-white"></div>
        <div id="equalBreakdown" class="text-slate-400 text-sm mt-2"></div>
      </div>
    </div>

    <!-- Unequal split -->
    <div id="unequalPanel" class="hidden bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-2xl space-y-4">
      <h2 class="text-lg font-bold">🎯 Who had what?</h2>
      <p class="text-slate-400 text-xs">Add each person and how much they owe (before tip). Leave blank to split remainder equally.</p>

      <div id="personsList" class="space-y-3"></div>

      <button onclick="addPerson()" class="w-full py-3 bg-white/10 hover:bg-white/20 border border-white/20 rounded-2xl text-sm font-semibold transition-all">
        + Add person
      </button>

      <!-- Unequal result -->
      <div id="unequalResult" class="hidden space-y-3 pt-2">
        <div class="h-px bg-white/10"></div>
        <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider">Who pays what</h3>
        <div id="unequalBreakdown" class="space-y-2"></div>
        <div class="h-px bg-white/10"></div>
        <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider">💡 Settle up (min transfers)</h3>
        <div id="settleUp" class="space-y-2"></div>
      </div>
    </div>

    <!-- Calculate button -->
    <button onclick="calculate()" class="w-full py-5 bg-gradient-to-r from-rose-600 to-pink-600 hover:from-rose-700 hover:to-pink-700 rounded-2xl font-black text-xl shadow-2xl transition-all">
      Calculate 💸
    </button>

    <!-- Share card -->
    <div id="shareCard" class="hidden bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-2xl space-y-3">
      <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider">📤 Share result</h3>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="shareAsText()" class="py-4 bg-gradient-to-r from-rose-600 to-pink-600 hover:from-rose-700 hover:to-pink-700 rounded-2xl font-bold transition-all text-sm">
          📋 Copy text
        </button>
        <button onclick="shareAsImage()" class="py-4 bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-700 hover:to-purple-700 rounded-2xl font-bold transition-all text-sm">
          🖼️ Share image
        </button>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
